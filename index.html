<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>五子棋</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f4efe6;
      --panel: #fffaf0;
      --ink: #1f2933;
      --muted: #687385;
      --line: #8a6638;
      --board: #d9a95f;
      --board-dark: #b98238;
      --black: #14171a;
      --white: #f7f7f2;
      --accent: #0f766e;
      --danger: #b42318;
      --shadow: 0 18px 50px rgba(55, 40, 20, 0.18);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Microsoft YaHei", "PingFang SC", Arial, sans-serif;
      color: var(--ink);
      background:
        radial-gradient(circle at 16% 12%, rgba(15, 118, 110, 0.14), transparent 28%),
        linear-gradient(135deg, #f9f3e8 0%, var(--bg) 48%, #e9dcc7 100%);
    }

    .app {
      width: min(1180px, calc(100vw - 32px));
      min-height: 100vh;
      margin: 0 auto;
      display: grid;
      grid-template-columns: minmax(320px, 1fr) 300px;
      gap: 24px;
      align-items: center;
      padding: 28px 0;
    }

    .game-area {
      display: grid;
      gap: 18px;
      justify-items: center;
    }

    header {
      width: min(680px, 100%);
      display: flex;
      align-items: end;
      justify-content: space-between;
      gap: 16px;
    }

    h1 {
      margin: 0;
      font-size: clamp(30px, 5vw, 52px);
      line-height: 1;
      letter-spacing: 0;
    }

    .subtitle {
      margin: 8px 0 0;
      color: var(--muted);
      font-size: 15px;
    }

    .turn-pill {
      min-width: 128px;
      border: 1px solid rgba(31, 41, 51, 0.12);
      border-radius: 8px;
      background: rgba(255, 250, 240, 0.85);
      padding: 10px 12px;
      box-shadow: 0 8px 24px rgba(55, 40, 20, 0.08);
    }

    .turn-label {
      color: var(--muted);
      font-size: 12px;
    }

    .turn-value {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-top: 4px;
      font-weight: 700;
    }

    .stone-mini {
      width: 18px;
      height: 18px;
      border-radius: 50%;
      border: 1px solid rgba(0, 0, 0, 0.2);
    }

    .stone-mini.black {
      background: radial-gradient(circle at 35% 28%, #464b52, var(--black) 62%);
    }

    .stone-mini.white {
      background: radial-gradient(circle at 35% 28%, #ffffff, var(--white) 64%);
    }

    .board-wrap {
      width: min(680px, 100%);
      aspect-ratio: 1;
      padding: clamp(12px, 2.4vw, 22px);
      border-radius: 8px;
      background: linear-gradient(145deg, var(--board), var(--board-dark));
      box-shadow: var(--shadow);
      border: 1px solid rgba(92, 60, 22, 0.35);
    }

    .board {
      position: relative;
      width: 100%;
      height: 100%;
      overflow: visible;
    }

    .board-grid {
      position: absolute;
      inset: clamp(18px, 5.5%, 34px);
      background-image:
        linear-gradient(var(--line) 1px, transparent 1px),
        linear-gradient(90deg, var(--line) 1px, transparent 1px);
      background-size:
        calc(100% / (var(--size) - 1)) calc(100% / (var(--size) - 1)),
        calc(100% / (var(--size) - 1)) calc(100% / (var(--size) - 1));
      background-position: top left;
      overflow: visible;
    }

    .cell {
      appearance: none;
      border: 0;
      padding: 0;
      background: transparent;
      position: absolute;
      display: grid;
      place-items: center;
      cursor: pointer;
      width: calc(100% / (var(--size) - 1));
      height: calc(100% / (var(--size) - 1));
      transform: translate(-50%, -50%);
    }

    .cell:focus-visible {
      outline: 2px solid var(--accent);
      outline-offset: -3px;
      z-index: 3;
    }

    .cell::before {
      content: "";
      width: 28%;
      height: 28%;
      border-radius: 50%;
      background: rgba(64, 45, 20, 0.25);
      transform: scale(0);
      transition: transform 120ms ease;
    }

    .cell:not(.occupied):hover::before {
      transform: scale(1);
    }

    .stone {
      position: absolute;
      width: 82%;
      height: 82%;
      border-radius: 50%;
      box-shadow: 0 7px 12px rgba(36, 24, 12, 0.3);
    }

    .stone.black {
      background: radial-gradient(circle at 35% 28%, #5b626b 0%, #20252a 34%, #060708 100%);
    }

    .stone.white {
      background: radial-gradient(circle at 35% 28%, #ffffff 0%, #f0eee6 48%, #cfc9ba 100%);
      border: 1px solid rgba(85, 73, 55, 0.26);
    }

    .stone.win {
      outline: 3px solid var(--accent);
      outline-offset: 3px;
    }

    .dot {
      position: absolute;
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: rgba(58, 39, 16, 0.7);
      transform: translate(-50%, -50%);
      pointer-events: none;
    }

    aside {
      align-self: stretch;
      display: grid;
      align-content: center;
      gap: 14px;
    }

    .panel {
      border: 1px solid rgba(31, 41, 51, 0.12);
      border-radius: 8px;
      background: rgba(255, 250, 240, 0.88);
      box-shadow: 0 12px 36px rgba(55, 40, 20, 0.12);
      padding: 18px;
      backdrop-filter: blur(12px);
    }

    .status {
      min-height: 66px;
    }

    .status h2,
    .panel h2 {
      margin: 0;
      font-size: 19px;
      letter-spacing: 0;
    }

    .status p,
    .panel p {
      margin: 8px 0 0;
      color: var(--muted);
      line-height: 1.55;
      font-size: 14px;
    }

    .controls {
      display: grid;
      gap: 10px;
    }

    .button-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    button.action,
    select {
      width: 100%;
      height: 42px;
      border: 1px solid rgba(31, 41, 51, 0.16);
      border-radius: 8px;
      background: #ffffff;
      color: var(--ink);
      font: inherit;
    }

    button.action {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      cursor: pointer;
      font-weight: 700;
    }

    button.primary {
      background: var(--accent);
      border-color: var(--accent);
      color: #ffffff;
    }

    button.action:disabled {
      cursor: not-allowed;
      opacity: 0.52;
    }

    label {
      display: grid;
      gap: 7px;
      color: var(--muted);
      font-size: 13px;
    }

    .history {
      max-height: 220px;
      overflow: auto;
      display: grid;
      gap: 7px;
      padding-right: 4px;
    }

    .history-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 8px 10px;
      border-radius: 7px;
      background: rgba(255, 255, 255, 0.62);
      color: var(--muted);
      font-size: 13px;
    }

    .history-item strong {
      color: var(--ink);
    }

    @media (max-width: 860px) {
      .app {
        grid-template-columns: 1fr;
        align-items: start;
        padding: 18px 0 28px;
      }

      aside {
        width: min(680px, 100%);
        margin: 0 auto;
        align-content: start;
      }
    }

    @media (max-width: 560px) {
      .app {
        width: min(100vw - 18px, 680px);
        gap: 14px;
      }

      header {
        align-items: stretch;
        flex-direction: column;
      }

      .turn-pill {
        width: 100%;
      }

      .board-wrap {
        padding: 10px;
      }
    }
  </style>
</head>
<body>
  <main class="app">
    <section class="game-area" aria-label="五子棋棋盘">
      <header>
        <div>
          <h1>五子棋</h1>
          <p class="subtitle">黑棋先手，任意方向连续五子即获胜。</p>
        </div>
        <div class="turn-pill" aria-live="polite">
          <div class="turn-label">当前回合</div>
          <div class="turn-value">
            <span id="turnStone" class="stone-mini black"></span>
            <span id="turnText">黑棋</span>
          </div>
        </div>
      </header>

      <div class="board-wrap">
        <div id="board" class="board" role="grid" aria-label="五子棋棋盘"></div>
      </div>
    </section>

    <aside>
      <section class="panel status" aria-live="polite">
        <h2 id="statusTitle">轮到黑棋</h2>
        <p id="statusText">点击棋盘交叉点落子。</p>
      </section>

      <section class="panel controls">
        <div class="button-row">
          <button id="newGame" class="action primary" type="button">新局</button>
          <button id="undo" class="action" type="button" disabled>悔棋</button>
        </div>
        <label>
          棋盘尺寸
          <select id="sizeSelect">
            <option value="15" selected>15 x 15 标准</option>
            <option value="13">13 x 13 快速</option>
            <option value="19">19 x 19 大棋盘</option>
          </select>
        </label>
      </section>

      <section class="panel">
        <h2>落子记录</h2>
        <p id="emptyHistory">暂无落子。</p>
        <div id="history" class="history" aria-label="落子记录"></div>
      </section>
    </aside>
  </main>

  <script>
    const boardElement = document.querySelector("#board");
    const statusTitle = document.querySelector("#statusTitle");
    const statusText = document.querySelector("#statusText");
    const turnStone = document.querySelector("#turnStone");
    const turnText = document.querySelector("#turnText");
    const historyElement = document.querySelector("#history");
    const emptyHistory = document.querySelector("#emptyHistory");
    const undoButton = document.querySelector("#undo");
    const newGameButton = document.querySelector("#newGame");
    const sizeSelect = document.querySelector("#sizeSelect");

    const directions = [
      [1, 0],
      [0, 1],
      [1, 1],
      [1, -1]
    ];

    let size = Number(sizeSelect.value);
    let cells = [];
    let moves = [];
    let current = "black";
    let winner = null;
    let winningLine = [];

    function createMatrix(nextSize) {
      return Array.from({ length: nextSize }, () => Array(nextSize).fill(null));
    }

    function resetGame(nextSize = size) {
      size = nextSize;
      cells = createMatrix(size);
      moves = [];
      current = "black";
      winner = null;
      winningLine = [];
      renderBoard();
      updatePanel();
    }

    function renderBoard() {
      boardElement.innerHTML = "";
      boardElement.style.setProperty("--size", size);

      const grid = document.createElement("div");
      grid.className = "board-grid";
      boardElement.appendChild(grid);

      addStarPoints(grid);

      for (let row = 0; row < size; row += 1) {
        for (let col = 0; col < size; col += 1) {
          const cell = document.createElement("button");
          cell.type = "button";
          cell.className = "cell";
          cell.dataset.row = row;
          cell.dataset.col = col;
          cell.style.left = `${(col / (size - 1)) * 100}%`;
          cell.style.top = `${(row / (size - 1)) * 100}%`;
          cell.setAttribute("role", "gridcell");
          cell.setAttribute("aria-label", `${row + 1} 行 ${col + 1} 列`);
          cell.addEventListener("click", () => placeStone(row, col));
          grid.appendChild(cell);
        }
      }

      renderStones();
    }

    function addStarPoints(grid) {
      const points = getStarPoints();
      points.forEach(([row, col]) => {
        const dot = document.createElement("span");
        dot.className = "dot";
        dot.style.left = `${(col / (size - 1)) * 100}%`;
        dot.style.top = `${(row / (size - 1)) * 100}%`;
        grid.appendChild(dot);
      });
    }

    function getStarPoints() {
      if (size === 13) {
        return [[3, 3], [3, 9], [6, 6], [9, 3], [9, 9]];
      }
      if (size === 19) {
        return [[3, 3], [3, 9], [3, 15], [9, 3], [9, 9], [9, 15], [15, 3], [15, 9], [15, 15]];
      }
      return [[3, 3], [3, 7], [3, 11], [7, 3], [7, 7], [7, 11], [11, 3], [11, 7], [11, 11]];
    }

    function renderStones() {
      document.querySelectorAll(".cell").forEach((cell) => {
        const row = Number(cell.dataset.row);
        const col = Number(cell.dataset.col);
        const stone = cells[row][col];
        cell.innerHTML = "";
        cell.classList.toggle("occupied", Boolean(stone));
        cell.disabled = Boolean(stone) || Boolean(winner);

        if (!stone) {
          return;
        }

        const stoneElement = document.createElement("span");
        stoneElement.className = `stone ${stone}`;
        if (winningLine.some(([winRow, winCol]) => winRow === row && winCol === col)) {
          stoneElement.classList.add("win");
        }
        cell.appendChild(stoneElement);
      });
    }

    function placeStone(row, col) {
      if (winner || cells[row][col]) {
        return;
      }

      cells[row][col] = current;
      moves.push({ row, col, player: current });
      winningLine = getWinningLine(row, col, current);
      if (winningLine.length >= 5) {
        winner = current;
      } else if (moves.length === size * size) {
        winner = "draw";
      } else {
        current = current === "black" ? "white" : "black";
      }

      renderStones();
      updatePanel();
    }

    function getWinningLine(row, col, player) {
      for (const [dx, dy] of directions) {
        const line = [[row, col]];

        collectDirection(line, row, col, dx, dy, player);
        collectDirection(line, row, col, -dx, -dy, player);

        if (line.length >= 5) {
          return line;
        }
      }
      return [];
    }

    function collectDirection(line, row, col, dx, dy, player) {
      let nextRow = row + dy;
      let nextCol = col + dx;

      while (
        nextRow >= 0 &&
        nextRow < size &&
        nextCol >= 0 &&
        nextCol < size &&
        cells[nextRow][nextCol] === player
      ) {
        line.push([nextRow, nextCol]);
        nextRow += dy;
        nextCol += dx;
      }
    }

    function undoMove() {
      if (!moves.length || winner) {
        if (winner && winner !== "draw") {
          const lastMove = moves.pop();
          if (lastMove) {
            cells[lastMove.row][lastMove.col] = null;
            current = lastMove.player;
            winner = null;
            winningLine = [];
          }
        }
        updateAfterUndo();
        return;
      }

      const lastMove = moves.pop();
      cells[lastMove.row][lastMove.col] = null;
      current = lastMove.player;
      updateAfterUndo();
    }

    function updateAfterUndo() {
      if (winner === "draw") {
        const lastMove = moves.pop();
        if (lastMove) {
          cells[lastMove.row][lastMove.col] = null;
          current = lastMove.player;
        }
      }
      winner = null;
      winningLine = [];
      renderStones();
      updatePanel();
    }

    function updatePanel() {
      const playerName = current === "black" ? "黑棋" : "白棋";
      turnStone.className = `stone-mini ${current}`;
      turnText.textContent = playerName;
      undoButton.disabled = moves.length === 0;

      if (winner === "draw") {
        statusTitle.textContent = "平局";
        statusText.textContent = "棋盘已满，点击新局重新开始。";
      } else if (winner) {
        statusTitle.textContent = `${winner === "black" ? "黑棋" : "白棋"}获胜`;
        statusText.textContent = "胜利棋子已高亮，可以新局或悔棋继续。";
      } else {
        statusTitle.textContent = `轮到${playerName}`;
        statusText.textContent = "点击棋盘交叉点落子。";
      }

      renderHistory();
    }

    function renderHistory() {
      historyElement.innerHTML = "";
      emptyHistory.hidden = moves.length > 0;

      moves.slice().reverse().forEach((move, index) => {
        const item = document.createElement("div");
        item.className = "history-item";
        const moveNumber = moves.length - index;
        const name = move.player === "black" ? "黑" : "白";
        item.innerHTML = `<strong>${moveNumber}. ${name}</strong><span>${move.row + 1} 行 ${move.col + 1} 列</span>`;
        historyElement.appendChild(item);
      });
    }

    undoButton.addEventListener("click", undoMove);
    newGameButton.addEventListener("click", () => resetGame(size));
    sizeSelect.addEventListener("change", () => resetGame(Number(sizeSelect.value)));

    resetGame();
  </script>
</body>
</html>
